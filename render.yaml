# StringStack Digital Book Reader
# One static site per book branch → one Graphy URL each.
# After first Blueprint sync, each service gets its own HTTPS URL on Render.

services:
  # Demo 1 — Graphy link for Day-01
  - type: web
    name: stringstack-demo-1
    runtime: static
    repo: https://github.com/udaymi8871/TextBook
    branch: book/01-demo-1
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"

